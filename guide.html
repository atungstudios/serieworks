<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>App Creation Guide</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <script src="nav.js"></script>
    <style>
        .docs-page {
            display: flex;
            align-items: flex-start;
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 24px 80px 24px;
        }

        /* Sidebar */
        .docs-sidebar {
            width: 200px;
            flex-shrink: 0;
            position: sticky;
            top: 72px;
            max-height: calc(100vh - 88px);
            overflow-y: auto;
            padding: 36px 0;
            scrollbar-width: none;
        }
        .docs-sidebar::-webkit-scrollbar { display: none; }

        .sidebar-heading {
            font-size: 0.7rem;
            font-weight: 600;
            color: #b0b8c4;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0 16px 10px;
        }
        .sidebar-nav { list-style: none; margin: 0; padding: 0; }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            font-size: 0.83rem;
            color: #9ca3af;
            text-decoration: none;
            border-left: 1px solid transparent;
            transition: color 0.15s, border-color 0.15s;
            line-height: 1.4;
        }
        .sidebar-nav a:hover { color: #374151; }
        .sidebar-nav a.active { color: #111827; font-weight: 500; border-left-color: #111827; }
        .sidebar-nav .phase-dot {
            width: 16px; height: 16px; border-radius: 50%;
            border: 1.5px solid currentColor;
            font-size: 0.6rem; font-weight: 700;
            display: inline-flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .sidebar-divider { border: none; border-top: 1px solid #f3f4f6; margin: 12px 16px; }

        .sidebar-hint {
            padding: 0 16px;
            font-size: 0.72rem;
            color: #b0b8c4;
            line-height: 1.5;
            margin-bottom: 10px;
        }
        .sidebar-reset {
            display: block;
            padding: 6px 16px;
            font-size: 0.78rem;
            color: #b0b8c4;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            transition: color 0.15s;
        }
        .sidebar-reset:hover { color: #ef4444; }
        .sidebar-export {
            display: block;
            padding: 6px 16px;
            font-size: 0.78rem;
            color: #b0b8c4;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            transition: color 0.15s;
        }
        .sidebar-export:hover { color: #667eea; }

        /* Main content */
        .docs-content { flex: 1; min-width: 0; padding: 36px 0 36px 52px; }

        .docs-breadcrumb {
            font-size: 0.78rem; color: #b0b8c4; margin-bottom: 28px;
            display: flex; align-items: center; gap: 6px;
        }
        .docs-breadcrumb a { color: inherit; text-decoration: none; }
        .docs-breadcrumb a:hover { color: #374151; }

        .docs-title { font-size: 1.7rem; font-weight: 700; color: #111827; letter-spacing: -0.02em; margin: 0 0 6px; }
        .docs-subtitle { font-size: 0.88rem; color: #9ca3af; margin: 0 0 40px; line-height: 1.6; }

        .docs-section { margin-bottom: 44px; scroll-margin-top: 90px; }
        .docs-section-title {
            font-size: 0.7rem;
            font-weight: 600;
            color: #b0b8c4;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin: 0 0 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .docs-section-badge {
            font-size: 0.7rem;
            font-weight: 600;
            color: #b0b8c4;
            flex-shrink: 0;
        }

        /* Steps */
        .docs-steps { list-style: none; margin: 0; padding: 0; }
        .docs-step { display: flex; gap: 18px; position: relative; padding-bottom: 24px; }
        .docs-step:not(:last-child) .step-left::after {
            content: '';
            position: absolute; top: 24px; left: 10px; width: 1px; bottom: 0;
            background: #e5e7eb;
        }
        .step-left { position: relative; width: 20px; flex-shrink: 0; padding-top: 3px; }
        .step-num {
            width: 20px; height: 20px; border-radius: 50%;
            border: 1.5px solid #d1d5db;
            color: #9ca3af; font-size: 0.65rem; font-weight: 600;
            display: flex; align-items: center; justify-content: center;
            position: relative; z-index: 1;
            background: #fafafa;
        }

        .step-body { flex: 1; padding-top: 1px; min-width: 0; }

        /* Editable text */
        [contenteditable] {
            outline: none;
            border-radius: 3px;
            transition: background 0.12s;
        }
        [contenteditable]:hover { background: #f9fafb; }
        [contenteditable]:focus {
            background: #f3f4f6;
            padding: 2px 5px;
            margin: -2px -5px;
        }
        [contenteditable]:empty::before {
            content: attr(data-placeholder);
            color: #d1d5db;
            pointer-events: none;
        }

        .step-title {
            display: block;
            font-size: 0.92rem; font-weight: 500; color: #1f2937; line-height: 1.5;
        }
        .step-desc {
            display: block;
            font-size: 0.83rem; color: #9ca3af; line-height: 1.65; margin: 4px 0 0 0;
        }

        /* Step delete button */
        .step-toolbar {
            position: absolute;
            right: 0; top: 1px;
            display: none;
            gap: 4px;
        }
        .docs-step:hover .step-toolbar { display: flex; }
        .step-delete {
            width: 18px; height: 18px; border-radius: 4px;
            background: none; color: #d1d5db; border: none;
            font-size: 1rem; cursor: pointer; display: flex;
            align-items: center; justify-content: center; line-height: 1;
            transition: color 0.12s;
        }
        .step-delete:hover { color: #ef4444; }

        /* Add step button */
        .add-step-btn {
            display: flex; align-items: center; gap: 6px;
            margin-top: 2px; padding: 6px 0;
            border: none;
            background: none; color: #c4c9d4; font-size: 0.8rem;
            cursor: pointer; transition: color 0.12s;
        }
        .add-step-btn:hover { color: #374151; }
        .add-step-btn svg { flex-shrink: 0; stroke: currentColor; }

        .section-name { flex: 1; }

        /* Step description rich text */
        .step-desc ul, .step-desc ol {
            margin: 6px 0 2px 0;
            padding-left: 20px;
        }
        .step-desc li { margin: 2px 0; }
        .step-desc p { margin: 4px 0 0; }

        /* Floating rich-text toolbar */
        .rt-toolbar {
            position: fixed;
            display: none;
            align-items: center;
            gap: 2px;
            background: #1f2937;
            border-radius: 7px;
            padding: 4px 6px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.22);
            z-index: 9999;
            transform: translateX(-50%);
            pointer-events: auto;
        }
        .rt-toolbar.visible { display: flex; }
        .rt-btn {
            width: 28px; height: 28px; border-radius: 5px;
            background: none; border: none;
            color: #d1d5db; font-size: 0.78rem; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background 0.1s, color 0.1s; line-height: 1; font-family: inherit;
        }
        .rt-btn:hover, .rt-btn.active { background: rgba(255,255,255,0.15); color: #fff; }
        .rt-sep { width: 1px; height: 16px; background: rgba(255,255,255,0.15); margin: 0 2px; flex-shrink: 0; }

        @media (max-width: 760px) {
            .docs-page { flex-direction: column; padding: 0 16px 80px; }
            .docs-sidebar { width: 100%; position: static; max-height: none; padding: 20px 0 0; border-bottom: 1px solid #e5e7eb; margin-bottom: 24px; }
            .docs-content { padding: 24px 0 0; }
        }
    </style>
</head>
<body>
    <header class="header"></header>

    <!-- Floating rich-text toolbar -->
    <div class="rt-toolbar" id="rtToolbar">
        <button class="rt-btn" data-cmd="bold" title="Bold"><b>B</b></button>
        <button class="rt-btn" data-cmd="italic" title="Italic"><i>I</i></button>
        <button class="rt-btn" data-cmd="underline" title="Underline"><u>U</u></button>
        <div class="rt-sep"></div>
        <button class="rt-btn" data-cmd="insertUnorderedList" title="Bullet list">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="2" cy="4" r="1" fill="currentColor" stroke="none"/><line x1="5" y1="4" x2="13" y2="4"/><circle cx="2" cy="10" r="1" fill="currentColor" stroke="none"/><line x1="5" y1="10" x2="13" y2="10"/></svg>
        </button>
        <button class="rt-btn" data-cmd="insertOrderedList" title="Numbered list">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><text x="1" y="5" font-size="4.5" fill="currentColor" stroke="none" font-family="sans-serif">1.</text><line x1="6" y1="4" x2="13" y2="4"/><text x="1" y="11" font-size="4.5" fill="currentColor" stroke="none" font-family="sans-serif">2.</text><line x1="6" y1="10" x2="13" y2="10"/></svg>
        </button>
        <div class="rt-sep"></div>
        <button class="rt-btn" data-cmd="removeFormat" title="Clear formatting" style="font-size:0.9rem;">&#10005;</button>
    </div>

    <div class="docs-page">
        <aside class="docs-sidebar">
            <p class="sidebar-heading">On this page</p>
            <ul class="sidebar-nav" id="sidebarNav"></ul>
            <hr class="sidebar-divider">
            <p class="sidebar-hint">Click any text to edit it. Changes are saved automatically.</p>
            <button class="sidebar-reset" id="resetGuide">&#8635; Reset to defaults</button>
            <button class="sidebar-export" id="exportGuide">&#8599; Copy as default content</button>
        </aside>

        <main class="docs-content" id="guideMain">
            <nav class="docs-breadcrumb">
                <a href="index.html" style="color:#667eea;text-decoration:none;">Serieworks</a>
                <span>&#8250;</span>
                App Creation Guide
            </nav>
            <h1 class="docs-title">App Creation Guide</h1>
            <p class="docs-subtitle">Click any text to edit it. Your changes are saved in the browser.</p>
        </main>
    </div>

    <footer class="footer"></footer>

    <script>
    const STORAGE_KEY = 'guide_v3';

    const DEFAULT_SECTIONS = [
    {
        "id": "phase1",
        "title": "App Idea",
        "steps": [
            {
                "title": "Identify Problem",
                "desc": "Identify a real-world problem that can be solved with a mobile app."
            },
            {
                "title": "Use AI to brainstorm app ideas to solve the problem",
                "desc": "Use Germini, Grok, and ChatGPT.  Make a list of the most interesting ones."
            },
            {
                "title": "Select Idea",
                "desc": "Select the final idea to implement."
            },
            {
                "title": "Use AI to brainstorm app name ideas",
                "desc": "Use the generated names to come up with a unique name for the app."
            }
        ]
    },
    {
        "id": "phase2",
        "title": "Vibe Coding Prompt",
        "steps": [
            {
                "title": "Generic Prompt",
                "desc": "Interactive with AI to come up with a prompt for Claude.  Ensure space for creativity."
            },
            {
                "title": "3 Rules of Refinement",
                "desc": "<ul><li>Ask \"What's Missing?\": Before asking for a rewrite, ask the AI: \"What details or edge cases did I forget to include in my original vision?\" This forces it to consider error states and deeper logic.</li><li>The \"Anti-Pattern\" Guardrail: Explicitly tell the AI what not to do (e.g., \"Do not use standard shadows; use layered colored glows instead\").</li><li>Chain-of-Thought Design: Ask the AI to \"explain the design theory\" behind its choices before it writes the code. This ensures the \"Aesthetic Signature\" is intentional, not random.</li></ul>"
            },
            {
                "title": "Freemium / Pro Features",
                "desc": "<div><span style=\"font-size: 0.83rem; font-family: -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;\">Make sure to include all essential features in the prompt.&nbsp;</span><span style=\"font-size: 0.83rem; font-family: -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;\">&nbsp;</span><span style=\"font-size: 0.83rem; font-family: -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;\">Decide which ones are free and which are pro only:</span></div><div><div><ul><li>Switching themes</li><li>Export to JSON</li><li>Analysis and Reports</li></ul><div>Make use IAP has Restore Purchase function.</div></div></div>"
            }
        ]
    },
    {
        "id": "phase3",
        "title": "Development",
        "steps": [
            {
                "title": "Start Vibe Coding",
                "desc": "Create folder for the app, open in VSCode, start prompting with the prompts from phase 2."
            },
            {
                "title": "Testing",
                "desc": "Use simulator or physical device to test if any errors and improvements can be made or additional features can be added."
            },
            {
                "title": "Iterate",
                "desc": "iterate steps 1 and 2 to refine the app."
            }
        ]
    },
    {
        "id": "phase4",
        "title": "Submit for Review",
        "steps": [
            {
                "title": "Build",
                "desc": "Build the IPA of the app within VSCode."
            },
            {
                "title": "Archive",
                "desc": "Use XCode to archive the build."
            },
            {
                "title": "Distribute",
                "desc": "Distribute the build to App Store Connect."
            },
            {
                "title": "Submit",
                "desc": "Configure the app on App Store Connect and submit for review."
            }
        ]
    },
    {
        "id": "phase5",
        "title": "Launch & Post-Launch",
        "steps": [
            {
                "title": "Add the app to serieworks.com",
                "desc": "Update apps.json and drop the app image into assets/app_img/."
            },
            {
                "title": "Share on social media & relevant communities",
                "desc": "Reddit, X, Hacker News, Product Hunt, and niche communities related to the app's topic."
            },
            {
                "title": "Monitor reviews & crash reports",
                "desc": "Check the developer console daily in the first week. Responding to reviews shows you care."
            },
            {
                "title": "Plan & ship first update based on feedback",
                "desc": "Prioritise the top user complaints and most-requested features. Aim to ship within 2–4 weeks."
            }
        ]
    }
];

    function loadState() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || null; } catch { return null; }
    }
    function saveState(sections) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(sections));
    }

    let sections = loadState() || JSON.parse(JSON.stringify(DEFAULT_SECTIONS));

    let saveTimer = null;
    function scheduleSave() {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => saveState(sections), 400);
    }

    // Plain single-line editor — used for step titles and section names
    function makeEditable(el, sectionIdx, stepIdx, field) {
        el.contentEditable = 'plaintext-only';
        if (el.contentEditable !== 'plaintext-only') el.contentEditable = 'true';
        el.spellcheck = false;
        el.addEventListener('input', () => {
            const raw = el.textContent.replace(/[\r\n]+/g, ' ');
            if (el.textContent !== raw) {
                el.textContent = raw;
                const range = document.createRange();
                const sel = window.getSelection();
                range.selectNodeContents(el);
                range.collapse(false);
                sel.removeAllRanges();
                sel.addRange(range);
            }
            sections[sectionIdx].steps[stepIdx][field] = el.textContent;
            scheduleSave();
        });
        el.addEventListener('paste', e => {
            e.preventDefault();
            const text = (e.clipboardData || window.clipboardData)
                .getData('text/plain').replace(/[\r\n]+/g, ' ');
            document.execCommand('insertText', false, text);
        });
        el.addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
        });
    }

    // Rich-text editor — used for step descriptions
    function makeDescEditable(el, sectionIdx, stepIdx) {
        el.contentEditable = 'true';
        el.spellcheck = false;
        el.addEventListener('focus', () => { window._activeDescEl = el; });
        el.addEventListener('input', () => {
            sections[sectionIdx].steps[stepIdx].desc = el.innerHTML;
            scheduleSave();
        });
        el.addEventListener('paste', e => {
            e.preventDefault();
            const html = e.clipboardData.getData('text/html');
            if (html) {
                const tmp = document.createElement('div');
                tmp.innerHTML = html;
                tmp.querySelectorAll('script,style,link,meta').forEach(n => n.remove());
                const allowed = new Set(['b','strong','i','em','u','ul','ol','li','p','br','span']);
                (function clean(node) {
                    [...node.childNodes].forEach(child => {
                        if (child.nodeType === 1) {
                            if (!allowed.has(child.tagName.toLowerCase())) {
                                child.replaceWith(...child.childNodes);
                            } else {
                                [...child.attributes].forEach(a => child.removeAttribute(a.name));
                                clean(child);
                            }
                        }
                    });
                })(tmp);
                document.execCommand('insertHTML', false, tmp.innerHTML);
            } else {
                document.execCommand('insertText', false, e.clipboardData.getData('text/plain'));
            }
        });
    }

    function makeSectionTitleEditable(el, sectionIdx) {
        el.contentEditable = 'true';
        el.spellcheck = false;
        el.addEventListener('input', () => {
            sections[sectionIdx].title = el.textContent;
            // Update sidebar link text
            const sidebarLink = document.querySelector(`#sidebarNav a[data-section="${sections[sectionIdx].id}"] .sidebar-label`);
            if (sidebarLink) sidebarLink.textContent = el.textContent;
            scheduleSave();
        });
        el.addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
        });
    }

    function renderStep(step, sectionIdx, stepIdx) {
        const li = document.createElement('li');
        li.className = 'docs-step';

        const stepLeft = document.createElement('div');
        stepLeft.className = 'step-left';
        const num = document.createElement('span');
        num.className = 'step-num';
        num.textContent = stepIdx + 1;
        stepLeft.appendChild(num);

        const body = document.createElement('div');
        body.className = 'step-body';
        body.style.position = 'relative';

        const titleEl = document.createElement('span');
        titleEl.className = 'step-title';
        titleEl.textContent = step.title;
        titleEl.dataset.placeholder = 'Step title…';
        makeEditable(titleEl, sectionIdx, stepIdx, 'title');

        const descEl = document.createElement('p');
        descEl.className = 'step-desc';
        // desc may be plain text (legacy) or HTML
        if (/<[a-z]/i.test(step.desc)) {
            descEl.innerHTML = step.desc;
        } else {
            descEl.textContent = step.desc;
        }
        descEl.dataset.placeholder = 'Add a description…';
        makeDescEditable(descEl, sectionIdx, stepIdx);

        // Delete button
        const toolbar = document.createElement('div');
        toolbar.className = 'step-toolbar';
        const delBtn = document.createElement('button');
        delBtn.className = 'step-delete';
        delBtn.title = 'Delete step';
        delBtn.innerHTML = '&times;';
        delBtn.addEventListener('click', () => {
            sections[sectionIdx].steps.splice(stepIdx, 1);
            saveState(sections);
            renderGuide();
        });
        toolbar.appendChild(delBtn);

        body.appendChild(titleEl);
        body.appendChild(descEl);
        body.appendChild(toolbar);

        li.appendChild(stepLeft);
        li.appendChild(body);
        return li;
    }

    function renderSection(section, sectionIdx) {
        const sec = document.createElement('section');
        sec.className = 'docs-section';
        sec.id = section.id;

        const h2 = document.createElement('h2');
        h2.className = 'docs-section-title';

        const badge = document.createElement('span');
        badge.className = 'docs-section-badge';
        badge.textContent = String(sectionIdx + 1).padStart(2, '0') + ' —';

        const nameEl = document.createElement('span');
        nameEl.className = 'section-name';
        nameEl.textContent = section.title;
        nameEl.dataset.placeholder = 'Phase name…';
        makeSectionTitleEditable(nameEl, sectionIdx);

        h2.appendChild(badge);
        h2.appendChild(nameEl);
        sec.appendChild(h2);

        const ol = document.createElement('ol');
        ol.className = 'docs-steps';
        section.steps.forEach((step, stepIdx) => {
            ol.appendChild(renderStep(step, sectionIdx, stepIdx));
        });
        sec.appendChild(ol);

        // Add step button
        const addBtn = document.createElement('button');
        addBtn.className = 'add-step-btn';
        addBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg> Add step';
        addBtn.addEventListener('click', () => {
            sections[sectionIdx].steps.push({ title: '', desc: '' });
            saveState(sections);
            renderGuide();
            // Focus the new step's title
            setTimeout(() => {
                const allSteps = document.querySelectorAll(`#${section.id} .step-title`);
                const last = allSteps[allSteps.length - 1];
                if (last) last.focus();
            }, 50);
        });
        sec.appendChild(addBtn);

        return sec;
    }

    function renderSidebar() {
        const nav = document.getElementById('sidebarNav');
        nav.innerHTML = '';
        sections.forEach((section, i) => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = '#' + section.id;
            a.dataset.section = section.id;

            const dot = document.createElement('span');
            dot.className = 'phase-dot';
            dot.textContent = i + 1;

            const label = document.createElement('span');
            label.className = 'sidebar-label';
            label.textContent = section.title;

            a.appendChild(dot);
            a.appendChild(label);
            li.appendChild(a);
            nav.appendChild(li);
        });
    }

    function renderGuide() {
        const main = document.getElementById('guideMain');
        // Keep breadcrumb, title, subtitle
        const staticEls = main.querySelectorAll('.docs-breadcrumb, .docs-title, .docs-subtitle');
        // Remove old sections
        main.querySelectorAll('.docs-section').forEach(el => el.remove());

        sections.forEach((section, i) => {
            main.appendChild(renderSection(section, i));
        });

        renderSidebar();
        initScrollSpy();
    }

    function initScrollSpy() {
        if (window._scrollSpyObserver) window._scrollSpyObserver.disconnect();
        const sidebarLinks = document.querySelectorAll('#sidebarNav a[data-section]');
        const obs = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    sidebarLinks.forEach(a => a.classList.remove('active'));
                    const active = document.querySelector('#sidebarNav a[data-section="' + entry.target.id + '"]');
                    if (active) active.classList.add('active');
                }
            });
        }, { rootMargin: '-20% 0px -70% 0px' });
        document.querySelectorAll('.docs-section').forEach(s => obs.observe(s));
        window._scrollSpyObserver = obs;
    }

    document.getElementById('exportGuide').addEventListener('click', () => {
        const json = JSON.stringify(sections, null, 4);
        const code = 'const DEFAULT_SECTIONS = ' + json + ';';
        navigator.clipboard.writeText(code).then(() => {
            const btn = document.getElementById('exportGuide');
            const orig = btn.textContent;
            btn.textContent = '✓ Copied!';
            btn.style.color = '#10b981';
            setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 2000);
        });
    });

    document.getElementById('resetGuide').addEventListener('click', () => {
        if (confirm('Reset all sections and steps to the defaults? This cannot be undone.')) {
            sections = JSON.parse(JSON.stringify(DEFAULT_SECTIONS));
            saveState(sections);
            renderGuide();
        }
    });

    // ── Floating rich-text toolbar ──────────────────────────────────────
    const rtToolbar = document.getElementById('rtToolbar');

    function hideToolbar() {
        rtToolbar.classList.remove('visible');
    }

    function updateToolbarActiveStates() {
        rtToolbar.querySelectorAll('.rt-btn[data-cmd]').forEach(btn => {
            const cmd = btn.dataset.cmd;
            try {
                btn.classList.toggle('active', document.queryCommandState(cmd));
            } catch(e) {}
        });
    }

    document.addEventListener('selectionchange', () => {
        const sel = window.getSelection();
        if (!sel || sel.isCollapsed || !sel.toString().length) {
            // Keep toolbar visible if mouse is over it
            if (!rtToolbar.matches(':hover')) hideToolbar();
            return;
        }
        // Only show if the selection is inside a .step-desc
        const anchor = sel.anchorNode;
        const descEl = anchor && (anchor.nodeType === 1 ? anchor : anchor.parentElement)
            ?.closest('.step-desc');
        if (!descEl) { hideToolbar(); return; }

        const range = sel.getRangeAt(0);
        const rect = range.getBoundingClientRect();
        if (!rect.width && !rect.height) { hideToolbar(); return; }

        rtToolbar.classList.add('visible');
        // Position centred above the selection
        const top = rect.top + window.scrollY - rtToolbar.offsetHeight - 8;
        const left = rect.left + rect.width / 2;
        rtToolbar.style.top = Math.max(4, top) + 'px';
        rtToolbar.style.left = left + 'px';
        updateToolbarActiveStates();
    });

    rtToolbar.addEventListener('mousedown', e => {
        const btn = e.target.closest('.rt-btn[data-cmd]');
        if (!btn) return;
        e.preventDefault(); // keep focus / selection in the editable
        const cmd = btn.dataset.cmd;
        document.execCommand(cmd, false, null);
        // Persist to state
        const activeDesc = window._activeDescEl;
        if (activeDesc) {
            const idx = [...document.querySelectorAll('.step-desc')].indexOf(activeDesc);
            // Find sectionIdx / stepIdx by scanning sections
            let count = 0;
            outer: for (let si = 0; si < sections.length; si++) {
                for (let ti = 0; ti < sections[si].steps.length; ti++) {
                    if (count === idx) {
                        sections[si].steps[ti].desc = activeDesc.innerHTML;
                        scheduleSave();
                        break outer;
                    }
                    count++;
                }
            }
        }
        updateToolbarActiveStates();
    });

    document.addEventListener('click', e => {
        if (!e.target.closest('.step-desc') && !e.target.closest('#rtToolbar')) {
            hideToolbar();
        }
    });

    renderGuide();
    </script>
</body>
</html>
