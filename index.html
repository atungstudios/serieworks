<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>serieworks</title>

    <!-- Google Fonts for Literata -->
    <link href="https://fonts.googleapis.com/css2?family=Literata&display=swap" rel="stylesheet">

    <!-- Link to CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Fixed Top Navbar for Logo and Search Input -->
    <nav class="navbar">
        <div class="logo">
            <h1>seriéworks</h1>
        </div>
        <!-- Search Bar in Navbar -->
        <input type="text" id="book-search" class="search-input" placeholder="Search Books..." />
    </nav>

    <!-- Category Filter Buttons -->
    <div class="category-filter">
        <button class="category-button active" data-category="all">All</button>
        <button class="category-button" data-category="Fiction">Fiction</button>
        <button class="category-button" data-category="Non-Fiction">Non-Fiction</button>
        <button class="category-button" data-category="Mystery">Mystery</button>
        <button class="category-button" data-category="Fantasy">Fantasy</button>
        <button class="category-button" data-category="Classics">Classics</button>
        <button class="category-button" data-category="History">History</button>
        <button class="category-button" data-category="Young Adult">Young Adult</button>
    </div>

    <!-- Books Section -->
    <section id="books" class="section">
        <div class="books-container" id="books-container">
            <!-- Book cards will be injected here by JavaScript -->
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2024 seriéworks. All Rights Reserved.</p>
    </footer>

    <!-- Link to JavaScript -->
    <script src="scripts.js"></script>
</body>

</html>
