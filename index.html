<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>serieworks</title>

    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">

    <!-- Google Fonts for Literata -->
    <link href="https://fonts.googleapis.com/css2?family=Literata&display=swap" rel="stylesheet">

    <!-- Link to CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Fixed Top Navbar for Logo and Search Input -->
    <nav class="navbar">
        <a href="index.html" class="logo">
            <img src="assets/logo-light.svg" alt="seriéworks logo" class="logo-image" />
        </a>
        <!-- Search Bar in Navbar -->
        <input type="text" id="book-search" class="search-input" placeholder="Search Books..." />
    </nav>

    <!-- Category Filter Buttons -->
    <div class="category-filter">
        <button class="category-button active" data-category="all">All</button>
        <button class="category-button" data-category="Ages 0-4">Ages 0-4</button>
        <button class="category-button" data-category="Ages 4-8">Ages 4-8</button>
        <button class="category-button" data-category="Ages 8-12">Ages 8-12</button>
        <button class="category-button" data-category="Board">Board</button>
        <button class="category-button" data-category="Concept">Concept</button>
        <button class="category-button" data-category="Picture">Picture</button>
        <button class="category-button" data-category="Begineer Chapter">Beginner Chapter</button>
        <button class="category-button" data-category="Fantasy">Fantasy</button>
        <button class="category-button" data-category="Adventure">Adventure</button>
        <button class="category-button" data-category="Mystery">Mystery</button>
        <button class="category-button" data-category="Humor">Humor</button>
    </div>
    
    

    <!-- Books Section -->
    <section id="books" class="section">
        <div class="books-container" id="books-container">
            <!-- Book cards will be injected here by JavaScript -->
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2024 seriéworks. All Rights Reserved.</p>
    </footer>

    <!-- Link to JavaScript -->
    <script src="scripts.js"></script>
</body>

</html>
