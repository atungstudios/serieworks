<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Serieworks</title>

    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">

    <!-- Google Fonts for Literata -->
    <link href="https://fonts.googleapis.com/css2?family=Literata&display=swap" rel="stylesheet">

    <!-- Link to CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Fixed Top Navbar for Logo and Search Input -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="assets/logo-dark.svg" alt="seriéworks logo" class="logo-image" />
            </a>
            <!-- Search Bar in Navbar -->
            <input type="text" id="book-search" class="search-input" placeholder="Search Audio Bedtime Stories..." />
        </div>
    </nav>

    <!-- Category Filter Buttons -->
    <div class="category-filter">
        <button class="category-button active" data-category="all">All</button>
        <button class="category-button" data-category="Toddler">Toddler</button>
        <button class="category-button" data-category="Preschool">Preschool</button>
        <button class="category-button" data-category="Gradeschooler">Gradeschooler</button>
        <button class="category-button" data-category="Teen">Teen</button>
        <button class="category-button" data-category="Young Adult">Young Adult</button>
        <button class="category-button" data-category="Adult">Adult</button>
    </div>
    
    

    <!-- Books Section -->
    <section id="books" class="section">
        <div class="books-container" id="books-container">
            <!-- Book cards will be injected here by JavaScript -->
        </div>
    </section>
    

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2025 Seriéworks. All Rights Reserved.</p>
    </footer>

    <!-- Link to JavaScript -->
    <script src="scripts.js" type="module"></script>
</body>

</html>
